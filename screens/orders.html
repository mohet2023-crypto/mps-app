<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Orders</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="../style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<span class="navbar-brand ms-3">MPS App</span>
</nav>

<div class="container">
<div class="container-box">

<a href="../index.html" class="back-link">← Back to Menu</a>

<h2>Orders</h2>

<select name="product" class="form-control">
<option>HALL-250</option>
<option>HALL-1KG</option>
<option>HALL-2KG</option>
</select>

<select name="month" class="form-control mt-2">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<input name="quantity" class="form-control mt-2" placeholder="Quantity">

<button class="btn btn-primary mt-2">Add Order</button>

<table class="table table-bordered mt-3">
<tr>
<th>Product</th>
<th>Month</th>
<th>Quantity</th>
</tr>
</table>

<button class="btn btn-success">Save</button>

</div>
</div>

</body>
</html>
